name: Ahma
permissions:
  contents: read
  pages: write
  id-token: write
# Heavy use of multi-layer caching to speed builds
# Github Actions caches grow since they do not forget unused files from old versions
#
# We rotate to a new cache every day, loading from the previous day's cache and
# then saving the fresh cache only containing the current files. We also work off of
# the 'main' banch. Github caching has special rules to fall back to 'main' from
# other branches. We also do not make new caches with every push to reduce clutter.
# There is an inherent performance tradeoff with this approach between slowly making
# new caches frequently (for example if we build new caches each time the git hash
# changes) and caches being too stupid to save updates if the name has not changed,
# thus forcing re-builds of any changes for the rest of the current day. Daily cache
# rotation is a good compromise.
#
# Caches still grow and slow things down. Run the following from command line if you
# want to delete caches, perhaps different types at different times:
#   gh cache delete --all
#   gh cache delete cargo-
#   gh cache delete gradle-
#
# Avoid pull requests- they cause needless double builds. Instead rebase from 'main'
# to your branch to give priority to your changes. Then rebase from your branch back
# to 'main', test, then push.

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

on:
  push:
    branches: [main, production]
  pull_request:
    branches: [main, production]

env:
  RUSTUP_MAX_RETRIES: 10
  CARGO_TERM_COLOR: always
  CARGO_PAGER: cat
  CARGO_INCREMENTAL: 0
  CARGO_PROFILE_TEST_DEBUG: 0
  CARGO_NET_RETRY: 10
  CARGO_PROFILE_DEV_BUILD_OVERRIDE_DEBUG: false
  RUSTFLAGS: -C debuginfo=0 --cfg reqwest_unstable # Do not produce debug symbols; enable HTTP/3 (QUIC) in reqwest
  RUST_BACKTRACE: 1
  IS_DEV_BUILD: "true" # Set "true" to speed up builds for CI testing
  RUSTC_WRAPPER: sccache
  SCCACHE_GHA_ENABLED: "true"
  SCCACHE_CACHE_SIZE: 1G # Limit sccache size to prevent GitHub Actions cache eviction
jobs:
  job-cargo-test:
    defaults:
      run:
        shell: bash
    strategy:
      fail-fast: false
      max-parallel: 2
      matrix:
        os: [ubuntu-latest, ubuntu-24.04-arm, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 2

      - name: Configure Windows Defender exclusions
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          Add-MpPreference -ExclusionPath "${{ github.workspace }}"
          Add-MpPreference -ExclusionPath "$env:USERPROFILE\.cargo"
          Add-MpPreference -ExclusionPath "$env:TEMP"

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: clippy, rustfmt
          rustflags: ""

      - name: Configure deterministic tooling env
        run: |
          git config --global core.pager cat
          git config --global fetch.recurseSubmodules false
          {
            echo "PAGER=cat"
            echo "LC_ALL=C"
            echo "LANG=C"
          } >> "$GITHUB_ENV"

      - name: Preflight workspace crate roots
        run: |
          set -euo pipefail
          missing=0
          while IFS= read -r manifest; do
            crate_dir="$(dirname "$manifest")"
            # Workspace root manifests may not define a package.
            if ! grep -q "^\[package\]" "$manifest"; then
              continue
            fi
            if [ ! -f "$crate_dir/src/lib.rs" ] && [ ! -f "$crate_dir/src/main.rs" ]; then
              echo "Missing crate root in $crate_dir (expected src/lib.rs or src/main.rs)"
              missing=1
            fi
          done < <(find . -name Cargo.toml -not -path "./target/*")

          if [ "$missing" -ne 0 ]; then
            echo ""
            echo "Preflight failed: one or more crates are missing source roots."
            echo "This often happens when required files exist locally but are untracked."
            exit 1
          fi

      - name: Get current day number
        id: day-number
        run: echo "day=$(date +%j)" >> "$GITHUB_OUTPUT"

      - name: Cache Cargo build artifacts
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ~/.cargo/.package-cache
            ~/.cargo/bin
          key: cargo-registry-${{ runner.os }}-${{ runner.arch }}-day${{ steps.day-number.outputs.day }}
          restore-keys: |
            cargo-registry-${{ runner.os }}-${{ runner.arch }}-

      - name: Configure sccache cache keys
        run: |
          echo "SCCACHE_GHA_CACHE_TO=sccache-${{ runner.os }}-${{ runner.arch }}-test-day${{ steps.day-number.outputs.day }}" >> "$GITHUB_ENV"
          echo "SCCACHE_GHA_CACHE_FROM=sccache-${{ runner.os }}-${{ runner.arch }}-test-day${{ steps.day-number.outputs.day }},sccache-${{ runner.os }}-${{ runner.arch }}-test-day,sccache-${{ runner.os }}-${{ runner.arch }}-android-day" >> "$GITHUB_ENV"

      - name: sccache-action
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Setup Cargo Binstall
        uses: cargo-bins/cargo-binstall@v1.16.6

      - name: Add Cargo Bin to PATH
        run: echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

      - name: Cargo Test (excluding Android/Kotlin tests)
        run: |
          echo "--- cargo --version" && cargo --version
          echo "--- Running cargo test (lower concurrency, more stable in CI)"
          # Exclude kotlin/android tests - they run in job-android only
          cargo test --locked --no-default-features -- --skip kotlin --skip android

      - name: Cargo Clippy
        if: runner.os == 'Linux' && runner.arch == 'X64'
        run: cargo clippy --locked

      - name: Cargo Clippy Tests
        if: runner.os == 'Linux' && runner.arch == 'X64'
        run: cargo clippy --tests --locked

      - name: Cargo Doc
        if: runner.os == 'Linux' && runner.arch == 'X64'
        run: cargo doc --no-deps

      - name: Upload documentation
        if: runner.os == 'Linux' && runner.arch == 'X64'
        uses: actions/upload-artifact@v6
        with:
          name: documentation
          path: target/doc

      - name: Show sccache stats
        run: sccache --show-stats

  #######################################

  job-android:
    runs-on: macos-latest
    env:
      TERM: xterm-256color
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 2

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Get current day number
        id: day-number
        run: echo "day=$(date +%j)" >> "$GITHUB_OUTPUT"

      - name: Cache AGP and more Gradle directories
        uses: actions/cache@v5
        with:
          path: |
            ~/.gradle/caches/modules-2
            ~/.gradle/caches/jars-*
            ~/.gradle/caches/transforms-*
            ~/.gradle/caches/build-cache-*
            ~/.gradle/daemon
            ~/.gradle/wrapper
          key: gradle-deeper-${{ runner.os }}-day${{ steps.day-number.outputs.day }}
          restore-keys: |
            gradle-deeper-${{ runner.os }}-

      - name: Preheat Gradle Daemon
        run: |
          ./gradlew tasks > /dev/null &
          echo "Gradle warming up slowly in background..."
        working-directory: ./test-data/AndoidTestBasicViews

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          rustflags: ""

      - name: Add Cargo Bin to PATH
        run: echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

      - name: Cache Android Cargo build artifacts
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ~/.cargo/.package-cache
            ~/.cargo/bin
          key: cargo-registry-${{ runner.os }}-${{ runner.arch }}-day${{ steps.day-number.outputs.day }}
          restore-keys: |
            cargo-registry-${{ runner.os }}-${{ runner.arch }}-

      - name: Configure sccache cache keys
        run: |
          echo "SCCACHE_GHA_CACHE_TO=sccache-macOS-ARM64-android-day${{ steps.day-number.outputs.day }}" >> "$GITHUB_ENV"
          echo "SCCACHE_GHA_CACHE_FROM=sccache-macOS-ARM64-android-day${{ steps.day-number.outputs.day }},sccache-macOS-ARM64-android-day,sccache-macOS-ARM64-test-day" >> "$GITHUB_ENV"

      - name: sccache-action
        uses: mozilla-actions/sccache-action@v0.0.9

      - uses: cargo-bins/cargo-binstall@v1.16.6

      - name: Check for cargo-ndk and install if missing
        run: |
          if ! cargo ndk --version &> /dev/null; then
            echo "cargo-ndk not found or broken, installing..."
            cargo binstall cargo-ndk --no-confirm --force || cargo install cargo-ndk --locked
          else
            echo "cargo-ndk is already installed, skipping installation"
          fi
          cargo ndk --version

      - name: Cache Android build artifacts
        uses: actions/cache@v5
        with:
          path: |
            ${{ github.workspace }}/.gradle
            ${{ runner.tool_cache }}/gradle
            ./test-data/AndoidTestBasicViews/.gradle
            ./test-data/AndoidTestBasicViews/app/build/intermediates
            ./test-data/AndoidTestBasicViews/app/build/outputs
            ./test-data/AndoidTestBasicViews/app/build/kotlin
            ./test-data/AndoidTestBasicViews/app/build/generated
            ./test-data/AndoidTestBasicViews/app/build/kspCaches
            ./test-data/AndoidTestBasicViews/app/build/tmp
            ./test-data/AndoidTestBasicViews/build/kotlin
            ./test-data/AndoidTestBasicViews/build/intermediates
          key: gradle-android-${{ runner.os }}-day${{ steps.day-number.outputs.day }}
          restore-keys: |
            gradle-android-${{ runner.os }}-

      - name: Run Android/Kotlin tests only
        run: |
          # Run ONLY kotlin/android tests (feature-gated and name-filtered for clarity)
          cargo test --locked -p ahma_mcp --features android -- kotlin android

      - name: Show sccache stats
        run: sccache --show-stats

  #######################################

  job-coverage:
    runs-on: ubuntu-latest
    # Only run on main branch pushes, not pull requests
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 2

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: llvm-tools-preview
          rustflags: ""

      - name: Configure deterministic tooling env
        run: |
          git config --global core.pager cat
          git config --global fetch.recurseSubmodules false
          {
            echo "PAGER=cat"
            echo "LC_ALL=C"
            echo "LANG=C"
          } >> "$GITHUB_ENV"

      - name: Get current day number
        id: day-number
        run: echo "day=$(date +%j)" >> "$GITHUB_OUTPUT"

      - name: Cache Cargo build artifacts
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ~/.cargo/.package-cache
            ~/.cargo/bin
          key: cargo-registry-${{ runner.os }}-${{ runner.arch }}-day${{ steps.day-number.outputs.day }}
          restore-keys: |
            cargo-registry-${{ runner.os }}-${{ runner.arch }}-

      - name: Cache AGP and more Gradle directories
        uses: actions/cache@v5
        with:
          path: |
            ~/.gradle/caches/modules-2
            ~/.gradle/caches/jars-*
            ~/.gradle/caches/transforms-*
            ~/.gradle/caches/build-cache-*
            ~/.gradle/daemon
            ~/.gradle/wrapper
          key: gradle-deeper-${{ runner.os }}-day${{ steps.day-number.outputs.day }}
          restore-keys: |
            gradle-deeper-${{ runner.os }}-

      - name: Preheat Gradle Daemon
        run: |
          ./gradlew tasks > /dev/null &
          echo "Gradle warming up slowly in background..."
        working-directory: ./test-data/AndoidTestBasicViews

      - name: Configure sccache cache keys
        run: |
          echo "SCCACHE_GHA_CACHE_TO=sccache-Linux-X64-coverage-day${{ steps.day-number.outputs.day }}" >> "$GITHUB_ENV"
          echo "SCCACHE_GHA_CACHE_FROM=sccache-Linux-X64-coverage-day${{ steps.day-number.outputs.day }},sccache-Linux-X64-coverage-day,sccache-Linux-X64-test-day" >> "$GITHUB_ENV"

      - name: sccache-action
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Setup Cargo Binstall
        uses: cargo-bins/cargo-binstall@v1.16.6

      - name: Add Cargo Bin to PATH
        run: echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

      - name: Check for cargo-ndk and install if missing
        run: |
          if ! cargo ndk --version &> /dev/null; then
            echo "cargo-ndk not found or broken, installing..."
            cargo binstall cargo-ndk --no-confirm --force || cargo install cargo-ndk --locked
          else
            echo "cargo-ndk is already installed, skipping installation"
          fi
          cargo ndk --version

      - name: Install cargo-llvm-cov
        run: cargo binstall cargo-llvm-cov --no-confirm --force

      - name: Generate coverage report
        run: |
          cargo llvm-cov --profile coverage --locked --no-default-features --html --output-dir ./coverage -- --skip kotlin --skip android --test-threads=2

      - name: Generate code simplicity report
        run: |
          cargo run -p ahma_simplify -- . --limit 20 --html
          cp CODE_SIMPLICITY.md coverage/
          cp CODE_SIMPLICITY.html coverage/

      - name: Generate Rust Docs
        run: |
          cargo doc --no-deps
          cp -r target/doc coverage/
          echo '<meta http-equiv="refresh" content="0; url=ahma_mcp/index.html">' > coverage/doc/index.html

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload coverage artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./coverage

      - name: Upload code simplicity report artifact
        uses: actions/upload-artifact@v6
        with:
          name: code-simplicity-report
          path: ./coverage/CODE_SIMPLICITY.md

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Show sccache stats
        run: sccache --show-stats

  #######################################

  job-release-binaries:
    name: Release Binaries (${{ matrix.platform }})
    # Run only on main branch pushes
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    defaults:
      run:
        shell: bash
    strategy:
      max-parallel: 2
      matrix:
        include:
          # Native builds (no cross-compilation needed)
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            platform: linux-x86_64
            use_cross: false
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            platform: linux-arm64
            use_cross: false
          - os: macos-latest
            target: aarch64-apple-darwin
            platform: darwin-arm64
            use_cross: false
          # Windows native build
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            platform: windows-x86_64
            use_cross: false
          # Cross-compiled musl builds (portable, no glibc dependency)
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            platform: linux-x86_64-musl
            use_cross: true
          - os: ubuntu-latest
            target: aarch64-unknown-linux-musl
            platform: linux-arm64-musl
            use_cross: true
          # Cross-compiled ARM 32-bit (Raspberry Pi 2/3)
          - os: ubuntu-latest
            target: armv7-unknown-linux-gnueabihf
            platform: linux-armv7
            use_cross: true
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 2

      - name: Configure Windows Defender exclusions
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          Add-MpPreference -ExclusionPath "${{ github.workspace }}"
          Add-MpPreference -ExclusionPath "$env:USERPROFILE\.cargo"
          Add-MpPreference -ExclusionPath "$env:TEMP"

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          target: ${{ matrix.target }}
          rustflags: ""

      - name: Configure deterministic tooling env
        run: |
          git config --global core.pager cat
          git config --global fetch.recurseSubmodules false
          {
            echo "PAGER=cat"
            echo "LC_ALL=C"
            echo "LANG=C"
          } >> "$GITHUB_ENV"

      - name: Preflight workspace crate roots
        run: |
          set -euo pipefail
          missing=0
          while IFS= read -r manifest; do
            crate_dir="$(dirname "$manifest")"
            # Workspace root manifests may not define a package.
            if ! grep -q "^\[package\]" "$manifest"; then
              continue
            fi
            if [ ! -f "$crate_dir/src/lib.rs" ] && [ ! -f "$crate_dir/src/main.rs" ]; then
              echo "Missing crate root in $crate_dir (expected src/lib.rs or src/main.rs)"
              missing=1
            fi
          done < <(find . -name Cargo.toml -not -path "./target/*")

          if [ "$missing" -ne 0 ]; then
            echo ""
            echo "Preflight failed: one or more crates are missing source roots."
            echo "This often happens when required files exist locally but are untracked."
            exit 1
          fi

      - name: Get current day number
        id: day-number
        run: echo "day=$(date +%j)" >> "$GITHUB_OUTPUT"

      - name: Cache Cargo build artifacts
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ~/.cargo/.package-cache
            ~/.cargo/bin
          key: cargo-registry-${{ runner.os }}-${{ runner.arch }}-${{ matrix.target }}-day${{ steps.day-number.outputs.day }}
          restore-keys: |
            cargo-registry-${{ runner.os }}-${{ runner.arch }}-${{ matrix.target }}-
            cargo-registry-${{ runner.os }}-${{ runner.arch }}-

      - name: Configure sccache cache keys
        if: "!matrix.use_cross"
        run: |
          echo "SCCACHE_GHA_CACHE_TO=sccache-${{ matrix.platform }}-release-day${{ steps.day-number.outputs.day }}" >> "$GITHUB_ENV"
          echo "SCCACHE_GHA_CACHE_FROM=sccache-${{ matrix.platform }}-release-day${{ steps.day-number.outputs.day }},sccache-${{ matrix.platform }}-release-day" >> "$GITHUB_ENV"

      - name: sccache-action
        if: "!matrix.use_cross"
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Setup Cargo Binstall
        uses: cargo-bins/cargo-binstall@v1.16.6

      - name: Add Cargo Bin to PATH
        run: echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

      - name: Install cross (for cross-compilation)
        if: matrix.use_cross
        run: |
          if ! command -v cross &> /dev/null; then
            echo "cross not found, installing..."
            cargo binstall cross --no-confirm || cargo install cross --git https://github.com/cross-rs/cross
          else
            echo "cross is already installed"
          fi

      - name: Build release binaries (native)
        if: "!matrix.use_cross"
        run: |
          cargo build --release --locked --target ${{ matrix.target }} -p ahma_mcp -p ahma_simplify

      - name: Build release binaries (cross-compiled)
        if: matrix.use_cross
        run: |
          # Disable sccache for cross builds (incompatible with cross's Docker containers)
          unset RUSTC_WRAPPER
          cross build --release --locked --target ${{ matrix.target }} -p ahma_mcp -p ahma_simplify

      - name: Package release binaries
        id: package
        run: |
          set -euo pipefail
          platform="${{ matrix.platform }}"
          mkdir -p dist
          if [[ "$RUNNER_OS" == "Windows" ]]; then
            archive_name="ahma-release-${platform}.zip"
            cp "target/${{ matrix.target }}/release/ahma-mcp.exe" dist/
            cp "target/${{ matrix.target }}/release/ahma-simplify.exe" dist/
            cp README.md dist/
            (cd dist && sha256sum ahma-mcp.exe ahma-simplify.exe > SHA256SUMS)
            (cd dist && 7z a "../${archive_name}" ahma-mcp.exe ahma-simplify.exe SHA256SUMS README.md)
          else
            archive_name="ahma-release-${platform}.tar.gz"
            cp target/${{ matrix.target }}/release/ahma-mcp dist/
            cp target/${{ matrix.target }}/release/ahma-simplify dist/
            cp README.md dist/
            (cd dist && shasum -a 256 ahma-mcp ahma-simplify > SHA256SUMS)
            tar -czf "$archive_name" -C dist ahma-mcp ahma-simplify SHA256SUMS README.md
          fi
          echo "archive_name=$archive_name" >> "$GITHUB_OUTPUT"
          echo "platform=$platform" >> "$GITHUB_OUTPUT"

      - name: Upload release binaries artifact
        uses: actions/upload-artifact@v6
        with:
          name: release-binaries-${{ matrix.platform }}
          path: ${{ steps.package.outputs.archive_name }}

      - name: Show sccache stats
        if: "!matrix.use_cross"
        run: sccache --show-stats

  #######################################

  job-publish-release:
    name: Publish Release
    needs: [job-cargo-test, job-android, job-release-binaries, job-coverage]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Download all release artifacts
        uses: actions/download-artifact@v5
        with:
          pattern: release-binaries-*
          merge-multiple: true

      - name: Generate combined SHA256SUMS
        run: |
          # Produce a single SHA256SUMS file covering every release archive.
          # This file is downloaded by scripts/publish-winget.sh to get the
          # installer hash for the Windows .zip without re-downloading the archive.
          sha256sum ahma-release-*.tar.gz ahma-release-*.zip > SHA256SUMS
          echo "SHA256SUMS contents:"
          cat SHA256SUMS

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest Release
          body: "Automated release from main branch"
          draft: false
          prerelease: false
          files: |
            ahma-release-*.tar.gz
            ahma-release-*.zip
            SHA256SUMS

  # --------------------------------------------------------------------------
  # Publish to Windows Package Manager (winget-pkgs)
  # Runs after a successful release publish on main.
  # Requires repository secret WINGET_TOKEN (GitHub PAT with winget-pkgs write
  # access).  If the secret is absent the job skips gracefully.
  # --------------------------------------------------------------------------
  job-publish-winget:
    name: Publish Winget Manifest
    needs: [job-publish-release]
    # Enable by defining repository variable WINGET_PUBLISH_ENABLED=true.
    if: ${{ vars.WINGET_PUBLISH_ENABLED == 'true' }}
    runs-on: windows-latest
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v6

      - name: Install wingetcreate
        shell: powershell
        run: |
          # winget is available on windows-latest but can be flaky on CI.
          # Download wingetcreate directly as a fallback to ensure reliability.
          $url = 'https://aka.ms/wingetcreate/latest'
          Invoke-WebRequest -Uri $url -OutFile wingetcreate.exe -UseBasicParsing
          Move-Item wingetcreate.exe "$env:LOCALAPPDATA\Microsoft\WindowsApps\wingetcreate.exe" -Force
          wingetcreate --version

      - name: Publish winget manifest
        env:
          WINGET_TOKEN: ${{ secrets.WINGET_TOKEN }}
        run: |
          if [ -z "${WINGET_TOKEN:-}" ]; then
            echo "WINGET_TOKEN secret not set — skipping winget publish."
            echo "Set the secret to enable automatic winget-pkgs PR submission."
            exit 0
          fi
          chmod +x scripts/publish-winget.sh
          ./scripts/publish-winget.sh
