Description: >-
  Ahma (Finnish for wolverine) is a high-performance Model Context Protocol
  (MCP) server that adapts any command-line tool for AI agent use. Create
  agents from your CLI tools with one JSON file. Built security-first with
  kernel-level file-system sandboxing on Linux/macOS; Windows AppContainer
  backend in development.

  Includes ahma_mcp (the MCP server) with built-in `simplify` subcommand
  for code complexity analysis with AI fix suggestions.
