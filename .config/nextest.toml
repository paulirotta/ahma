# Nextest configuration for ahma_mcp
#
# All profiles use immediate output by default for better CI diagnostics
# and to avoid buffering issues with subprocess-spawning tests.

[profile.default]
# Default timeout is 60s
slow-timeout = { period = "60s", terminate-after = 2 }
# Use reasonable retry settings
retries = 0
# Show output immediately - improves debugging and prevents issues with subprocess tests
failure-output = "immediate"
success-output = "immediate"

# CI profile — activated with `cargo nextest run --profile ci` in build.yml.
# On GitHub Actions runners (2 CPUs), test-threads = "num-cpus" = 2, which
# combined with threads-required = 2 below means only 1 resource-heavy test
# runs at a time.  This prevents port conflicts, cargo target-dir lock
# contention, and process-spawn storms on low-core runners.
[profile.ci]
retries = 0
slow-timeout = { period = "120s", terminate-after = 2 }
# Equals the number of available cores on the runner (2 on GitHub Actions).
# This is the primary throttle for CI; the default profile does NOT set this
# so developers run with full parallelism on powerful local machines.
test-threads = "num-cpus"
# Show output immediately for better CI diagnostics
failure-output = "immediate"
success-output = "immediate"

# Timing-sensitive handshake tests benefit from reduced parallelism
# These tests rely on precise timing (waiting for timeout expiration)
[[profile.ci.overrides]]
filter = "test(handshake_timeout_test::)"
threads-required = 2
retries = 0

# Subprocess-spawning tests each start an ahma_mcp child process.  On 2-CPU
# CI runners (test-threads = 2) reserving 2 slots means only 1 runs at a
# time, avoiding cargo target-dir lock contention and process-spawn storms.
[[profile.ci.overrides]]
filter = "test(path_security) | test(mcp_service_coverage_improvement) | test(mcp_callback_coverage) | test(schema_validation) | test(mcp_integration_tests) | test(logging_coverage) | test(mcp_service_edge_cases) | test(mcp_service_integration_coverage) | test(sequence_failure_edge_cases) | test(tools_dir_auto_detection) | test(client_coverage_expansion_test)"
threads-required = 2

[[profile.ci.overrides]]
filter = "test(sandbox_roots_handshake_test::) | test(session_delete_test::) | test(handshake_concurrency_test::) | test(http_bridge_integration_test::) | test(http_roots_handshake_integration_test::) | test(bridge_stress_tests::) | test(shell_tool_tests::) | test(file_tool_tests::) | test(git_tool_tests::) | test(python_tool_tests::) | test(tool_integration_test::) | test(request_handler_coverage_test::) | test(sandbox_lifecycle_notification_test::) | test(sse_streaming_test::) | test(sse_endpoint_test::) | test(cargo_tool_integration_test::) | test(fast_error_response_test::) | test(handshake_replay_test::) | test(http3_integration_test::) | test(http_initialize_validation_integration_test::) | test(progress_token_http_integration_test::) | test(sandbox_roots_handshake_stress_test::) | test(sandbox_security_test::) | test(session_coverage_test::) | test(session_sandbox_test::) | test(session_stress_test::)"
threads-required = 2
slow-timeout = { period = "120s", terminate-after = 2 }

# HTTP bridge integration tests spawn ahma-mcp server subprocesses.
# Locally (default profile) these run with full parallelism — the M4 Ultra
# and similar developer machines have enough resources to handle concurrent
# servers.  Throttling via threads-required only happens in the ci profile
# (see [[profile.ci.overrides]] below), where GitHub Actions runners have 2
# CPUs and parallel server startups cause lock contention and handshake
# timeouts.
[[profile.default.overrides]]
filter = "test(sandbox_roots_handshake_test::) | test(session_delete_test::) | test(handshake_concurrency_test::) | test(http_bridge_integration_test::) | test(http_roots_handshake_integration_test::) | test(bridge_stress_tests::) | test(shell_tool_tests::) | test(file_tool_tests::) | test(git_tool_tests::) | test(python_tool_tests::) | test(tool_integration_test::) | test(request_handler_coverage_test::) | test(sandbox_lifecycle_notification_test::) | test(sse_streaming_test::) | test(sse_endpoint_test::) | test(cargo_tool_integration_test::) | test(fast_error_response_test::) | test(handshake_replay_test::) | test(http3_integration_test::) | test(http_initialize_validation_integration_test::) | test(progress_token_http_integration_test::) | test(sandbox_roots_handshake_stress_test::) | test(sandbox_security_test::) | test(session_coverage_test::) | test(session_sandbox_test::) | test(session_stress_test::)"
slow-timeout = { period = "120s", terminate-after = 3 }

# test_tool_call_with_different_working_directory makes a real SSE + roots/list
# handshake. Under peak parallel load the subprocess may take >60 s to
# respond; one automatic retry avoids a spurious CI red while preserving
# the invariant that repeated failures indicate a real session-isolation bug.
[[profile.default.overrides]]
filter = "test(test_tool_call_with_different_working_directory)"
retries = 1

# http_bridge_integration_test tests open SSE streams and exchange roots/list
# messages via spawned subprocesses. Under heavy parallel load the handshake
# can exceed the 60 s TimeoutCategory::Handshake deadline, producing a panic
# that would be a false failure. One retry lets transient overload pass
# without hiding real session-isolation bugs (which would fail both attempts).
[[profile.default.overrides]]
filter = "test(http_bridge_integration_test::)"
retries = 1

# Coverage profile for cargo llvm-cov (instrumentation makes tests much slower)
[profile.coverage]
retries = 0
slow-timeout = { period = "1800s", terminate-after = 2 }
# Show output immediately - critical for coverage builds where subprocess tests can timeout
failure-output = "immediate"
success-output = "immediate"
