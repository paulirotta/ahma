# .config/nextest.toml
#
# STABILITY DESIGN — read before modifying.
#
# History: the previous configuration maintained a hand-written list of individual
# test() name overrides to throttle subprocess-spawning tests on CI (2 CPUs). That
# list was always incomplete — new tests were added without being listed — causing
# un-throttled subprocess tests to run concurrently, starving the scheduler, and
# producing SSE handshake timeouts (the classic "works on M5, breaks on CI" pattern).
#
# Current approach uses STRUCTURAL filters (package / binary_id) so every test in
# scope is automatically covered without maintaining a name list.
#
# THROTTLING POLICY:
#
#   ahma_http_bridge
#     ALL tests in this package spawn an ahma-mcp HTTP server subprocess.
#     Covered by: package(ahma_http_bridge)
#
#   ahma_mcp integration tests
#     Integration test binaries have binary_id "ahma_mcp::<file-name>".
#     Many of them spawn ahma-mcp subprocess. Throttle all of them.
#     Covered by: binary_id(~ahma_mcp::)
#     NOT matched: the lib unit test binary "ahma_mcp" (no :: separator).
#     That binary runs in parallel — it is in-process and fast.
#
#   Everything else
#     Runs with full parallelism; no throttle needed.
#
# ADDING A NEW SUBPROCESS-SPAWNING TEST:
#   - In ahma_http_bridge/tests/:  nothing to do, package filter covers it.
#   - In ahma_mcp/tests/:          nothing to do, binary_id filter covers it.
#   - In a NEW package:            add a package() or binary_id() filter below.
#     Do NOT add individual test() name overrides — they break as the codebase grows.

# ---------------------------------------------------------------------------
# Default profile (developer machines — threads-required throttle, no global cap)
# ---------------------------------------------------------------------------
#
# Note: `threads-required` is set on subprocess-heavy test packages to
# throttle concurrent subprocess count.  This prevents IPC pipe back-pressure
# and SSE handshake timeouts that occur when all bridge / ahma_mcp integration
# tests run simultaneously.  It is NOT a global `test-threads` cap — other
# tests (unit tests, etc.) still run with full parallelism.

[profile.default]
slow-timeout = { period = "60s", terminate-after = 2 }
failure-output = "immediate"
success-output = "never"

# Bridge tests spawn server subprocesses and need longer slow-timeout headroom
# even on fast developer machines under load.
# threads-required = 4 caps concurrent bridge tests at (num-cpus / 4) without
# adding a global test-threads limit, preventing IPC pipe starvation.
# Using 4 (not 2) so that on a 10-CPU machine only ~2 bridge tests run at once;
# this prevents handshake timeouts when --run-ignored all adds extra load.
[[profile.default.overrides]]
filter = "package(ahma_http_bridge)"
threads-required = 4
slow-timeout = { period = "120s", terminate-after = 2 }

# Many ahma_mcp integration test binaries spawn ahma-mcp subprocess.
# Throttle all integration tests (binary_id "ahma_mcp::*") to prevent
# scheduler starvation when running concurrently with bridge tests.
[[profile.default.overrides]]
filter = "binary_id(~ahma_mcp::)"
threads-required = 2

# ---------------------------------------------------------------------------
# CI profile — activated by: cargo nextest run --profile ci
# On GitHub Actions, test-threads = "num-cpus" = 2.
# ---------------------------------------------------------------------------

[profile.ci]
test-threads = "num-cpus"
slow-timeout = { period = "120s", terminate-after = 2 }
failure-output = "immediate"
success-output = "never"
retries = 0

# Every test in ahma_http_bridge spawns a server subprocess.
# threads-required = 2 with test-threads = 2 => only 1 bridge test at a time.
# This prevents port conflicts, CPU starvation, and SSE handshake timeouts.
[[profile.ci.overrides]]
filter = "package(ahma_http_bridge)"
threads-required = 2
slow-timeout = { period = "180s", terminate-after = 2 }

# Many ahma_mcp integration test binaries spawn ahma-mcp subprocess.
# Throttle all integration tests (binary_id "ahma_mcp::*") to 1 at a time.
# The main lib test binary ("ahma_mcp", no :: separator) is NOT matched and
# runs in parallel with other non-subprocess tests.
[[profile.ci.overrides]]
filter = "binary_id(~ahma_mcp::)"
threads-required = 2

# ---------------------------------------------------------------------------
# Coverage profile (cargo llvm-cov) — instrumentation slows tests significantly
# ---------------------------------------------------------------------------

[profile.coverage]
slow-timeout = { period = "1800s", terminate-after = 2 }
failure-output = "immediate"
success-output = "never"
retries = 0
